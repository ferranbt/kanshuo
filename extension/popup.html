<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #ccc;
    }

    .status-indicator.green {
      background-color: #4caf50;
    }

    .status-indicator.yellow {
      background-color: #ffc107;
    }

    .status-indicator.gray {
      background-color: #9e9e9e;
    }

    .status-indicator.blue {
      background-color: #2196f3;
    }

    .video-info {
      font-size: 13px;
      color: #666;
      margin-bottom: 15px;
    }

    .video-id {
      font-family: monospace;
      background: #f5f5f5;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .btn-enable {
      background-color: #4caf50;
      color: white;
    }

    .btn-enable:hover {
      background-color: #45a049;
    }

    .btn-disable {
      background-color: #f44336;
      color: white;
    }

    .btn-disable:hover {
      background-color: #da190b;
    }

    .btn-download {
      background-color: #ffc107;
      color: #000;
    }

    .btn-download:hover {
      background-color: #ffb300;
    }

    button:disabled {
      background-color: #e0e0e0;
      color: #9e9e9e;
      cursor: not-allowed;
    }

    .message {
      text-align: center;
      color: #666;
      font-size: 13px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="message">Loading...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
